# =========================================================
# ServiceAccount for k6
# =========================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k6
  namespace: monitoring
---
# =========================================================
# ConfigMap – k6 test script
# Edit the script below to define your load test scenarios.
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: monitoring
data:
  script.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      stages: [
        { duration: '1m', target: 10 },   // ramp up to 10 VUs over 1 minute
        { duration: '3m', target: 10 },   // hold at 10 VUs for 3 minutes
        { duration: '1m', target: 0 },    // ramp down
      ],
      thresholds: {
        http_req_duration: ['p(95)<500'],  // 95% of requests must finish within 500 ms
        http_req_failed:   ['rate<0.01'],  // less than 1% failure rate
      },
    };

    const BASE_URL = __ENV.TARGET_URL || 'http://example.com';

    export default function () {
      const res = http.get(BASE_URL);
      check(res, {
        'status is 200': (r) => r.status === 200,
      });
      sleep(1);
    }
---
# =========================================================
# Job – runs k6 once and exits
# Metrics are streamed to InfluxDB (k6 database).
# To re-run, delete and re-apply the Job, or use a CronJob.
# =========================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: monitoring
  labels:
    app: k6
spec:
  # Keep the last 3 completed / 1 failed pod for log inspection
  ttlSecondsAfterFinished: 86400   # auto-delete after 24 h
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: k6
    spec:
      serviceAccountName: k6
      restartPolicy: Never

      containers:
        - name: k6
          image: grafana/k6:0.56.0

          # Run the script and push metrics to InfluxDB
          args:
            - run
            - --out
            - influxdb=http://influxdb-svc.monitoring:8086/k6
            - /scripts/script.js

          env:
            # Override this to point k6 at your actual target
            - name: TARGET_URL
              value: "http://example.com"

          volumeMounts:
            - name: k6-script
              mountPath: /scripts

          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

      volumes:
        - name: k6-script
          configMap:
            name: k6-script
